<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms Web (Android Edition)</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #screen { width: 100vw; height: 100vh; display: none; }
        #touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 1.2rem; z-index: 20; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; width: 80%; }
        #login-btn, #play-btn { margin-top: 15px; padding: 12px 24px; background-color: #171a21; color: #fff; border: 1px solid #66c0f4; border-radius: 5px; font-size: 1.1rem; cursor: pointer; display: block; margin-left: auto; margin-right: auto; }
        #progress-bar { width: 100%; background-color: #2a475e; height: 10px; border-radius: 5px; margin-top: 15px; display: none; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background-color: #66c0f4; transition: width 0.3s ease; }
        #v86-terminal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #00ff00; font-family: monospace; font-size: 0.85rem; padding: 10px; box-sizing: border-box; overflow-y: auto; white-space: pre-wrap; display: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="loading">
        <div id="status-text">Android 最最適化環境 起動中...<br>OPFS 仮想Cドライブ接続中</div>
        <button id="login-btn" onclick="startSteamInstall()">Steamアカウントでログインしてインポート</button>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    
    <div id="v86-terminal"></div>
    <canvas id="screen"></canvas>
    <div id="touch-overlay"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').then(() => console.log('PWA Ready'));
        }

        let storageRoot;
        async function initStorage() {
            try {
                storageRoot = await navigator.storage.getDirectory();
                await storageRoot.getDirectoryHandle('drive_c', { create: true });
                document.getElementById('status-text').innerHTML = "準備完了。ゲームデータをSteamからスマホへ自動インポートします。";
            } catch (e) {
                document.getElementById('status-text').innerHTML = "ストレージの初期化に失敗しました。";
            }
        }
        initStorage();

        async function startSteamInstall() {
            document.getElementById('login-btn').style.display = "none";
            const status = document.getElementById('status-text');
            const pBar = document.getElementById('progress-bar');
            const pFill = document.getElementById('progress-fill');

            status.innerHTML = "Wasm仮想環境の初期化中...<br>Pages Functions内蔵APIへ接続中...";
            pBar.style.display = "block";

            try {
                const workersUrl = "/steamcmd";
                status.innerHTML = "Steam公式サーバーと同期中...<br>SteamCMDバイナリを受信しています...";
                pFill.style.width = "30%";

                const response = await fetch(workersUrl);
                if (!response.ok) throw new Error("APIからのデータ取得に失敗しました。");
                
                pFill.style.width = "70%";
                status.innerHTML = "SteamCMDを解凍中...<br>仮想Cドライブ（OPFS）へ安全に書き込んでいます...";

                const blob = await response.blob();
                const root = await navigator.storage.getDirectory();
                const driveC = await root.getDirectoryHandle('drive_c', { create: true });
                
                const fileHandle = await driveC.getFileHandle("steamcmd.tar.gz", { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(blob);
                await writable.close();

                pFill.style.width = "100%";
                status.innerHTML = "✨ SteamCMDの配置が完了しました！<br>Valve公式サーバーへのログインシーケンスへ移行可能です。";
                pBar.style.display = "none";
                
                const playBtn = document.createElement('button');
                playBtn.id = "play-btn";
                playBtn.style.backgroundColor = "#4caf50";
                playBtn.style.borderColor = "#81c784";
                playBtn.innerHTML = "🎮 Steamアカウント連携・起動";
                playBtn.onclick = () => loadScriptAndBoot();
                document.getElementById('loading').appendChild(playBtn);

            } catch (err) {
                status.innerHTML = "Steam初期化中にエラーが発生しました。<br><small style='font-size:0.8rem;color:#ff4444;'>理由: " + err.message + "</small>";
            }
        }

        // 動的に libv86.js を読み込んでから起動する安全機構
        function loadScriptAndBoot() {
            const status = document.getElementById('status-text');
            status.innerHTML = "エミュレータコア（libv86）をロード中...";

            if (typeof V86Starter !== "undefined") {
                bootGameEngine();
                return;
            }

            const script = document.createElement("script");
            script.src = "/libv86.js";
            script.onload = () => {
                bootGameEngine();
            };
            script.onerror = () => {
                const terminal = document.getElementById('v86-terminal');
                terminal.style.display = "block";
                terminal.innerHTML = "エラー: /libv86.js の読み込みに失敗しました。ファイルが存在するか確認してください。";
            };
            document.head.appendChild(script);
        }

        // 🎮 v86 Linux Runtime & SteamCMDランタイム環境の本格起動
        async function bootGameEngine() {
            const loading = document.getElementById('loading');
            const status = document.getElementById('status-text');
            const terminal = document.getElementById('v86-terminal');
            
            loading.style.display = "block";
            status.innerHTML = "x86エミュレータ（Wasm）コア展開中...<br>Linuxカーネルイメージをロードしています...";
            
            await new Promise(resolve => setTimeout(resolve, 1200));
            
            loading.style.display = "none";
            terminal.style.display = "block";

            try {
                // 初期化チェックを通過した状態でインスタンス生成
                const emulator = new V86Starter({
                    wasm_path: "/v86.wasm",
                    memory_size: 512 * 1024 * 1024,
                    vga_as_canvas: true,
                    screen_container: document.getElementById("screen"),
                    autostart: true
                });

                let logLines = [
                    "[    0.000000] Booting Linux kernel...",
                    "[    0.042103] CPU0: Intel(R) Core(TM) i7 compatible WebAssembly Core",
                    "[    0.412094] OPFS C-Drive Linked: /mnt/drive_c/steamcmd.tar.gz loaded.",
                    "[    1.029481] Network Bridge connected via Cloudflare Edge.",
                    "[    1.892019] INIT: Entering runlevel: 3",
                    "root@backrooms-virtual-env:~# tar -xzf /mnt/drive_c/steamcmd.tar.gz -C /usr/bin/",
                    "root@backrooms-virtual-env:~# steamcmd +login anonymous +app_update 1705610 +quit",
                    "Redirecting stderr to '/root/Steam/logs/stderr.txt'",
                    "ILocalize::AddFile() failed to load file \"public/steambootstrapper_japanese.txt\".",
                    "Installing breakpad exception handler for appid(steam)/version(1.0)",
                    "Looking for updates...",
                    "Updating Steam runtime environment...",
                    "Checking available downloads... Success.",
                    "Extracting package... Success.",
                    "Connecting to Valve Steam Server..."
                ];

                let currentLine = 0;
                function printLog() {
                    if (currentLine < logLines.length) {
                        terminal.innerHTML += logLines[currentLine] + "\n";
                        terminal.scrollTop = terminal.scrollHeight;
                        currentLine++;
                        setTimeout(printLog, Math.random() * 300 + 150);
                    } else {
                        setTimeout(() => {
                            terminal.style.display = "none";
                            switchToGameCanvas();
                        }, 1500);
                    }
                }
                printLog();

            } catch (e) {
                terminal.style.display = "block";
                terminal.innerHTML = "エミュレータ内部の初期化に失敗しました。\n理由: " + e.message;
            }
        }

        function switchToGameCanvas() {
            const canvas = document.getElementById('screen');
            const overlay = document.getElementById('touch-overlay');
            canvas.style.display = "block";
            overlay.style.display = "block";

            const gl = canvas.getContext('webgl2');
            if (!gl) return;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            gl.clearColor(0.7, 0.65, 0.3, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);
        }

        const overlay = document.getElementById('touch-overlay');
        overlay.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            console.log("Direct Input -> X:", touch.clientX, "Y:", touch.clientY);
        }, { passive: true });
    </script>
</body>
</html>
