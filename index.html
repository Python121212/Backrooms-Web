<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms Web (Android Edition)</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #screen { width: 100vw; height: 100vh; display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 1.2rem; z-index: 20; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; width: 80%; }
        #play-btn { margin-top: 15px; padding: 12px 24px; background-color: #4caf50; color: #fff; border: 1px solid #81c784; border-radius: 5px; font-size: 1.1rem; cursor: pointer; display: block; margin-left: auto; margin-right: auto; }
        
        /* リアル仮想マシン・コンソール表示エリア */
        #v86-terminal { position: absolute; bottom: 20px; left: 5%; width: 90%; height: 45%; background: #000; color: #00ff00; font-family: monospace; font-size: 0.75rem; padding: 10px; box-sizing: border-box; overflow-y: auto; white-space: pre-wrap; display: none; z-index: 5; border: 2px solid #333; }
    </style>
</head>
<body>

    <div id="loading">
        <div id="status-text">本物エミュレーションインフラ準備完了</div>
        <button id="play-btn" onclick="loadScriptAndBoot()">🚀 WebAssembly VM 物理起動</button>
    </div>
    
    <div id="v86-terminal"></div>

    <canvas id="screen"></canvas>
    <div id="touch-overlay"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }

        function loadScriptAndBoot() {
            document.getElementById('status-text').innerHTML = "libv86.js コアランタイムをロード中...";
            const script = document.createElement("script");
            script.src = "/libv86.js";
            script.onload = () => { bootRealV86Engine(); };
            script.onerror = () => { alert("コアスクリプトのロードに失敗しました。"); };
            document.head.appendChild(script);
        }

        // 🎯 公式が現在稼働させている安定版Linuxイメージを直接マウント
        function bootRealV86Engine() {
            document.getElementById('loading').style.display = "none";
            const terminal = document.getElementById('v86-terminal');
            terminal.style.display = "block";
            
            terminal.innerHTML = "--- WebAssembly x86_64 Hardware Emulation Init ---\nConnecting to official image storage...\n";

            try {
                // v86公式が運用しているテスト用LinuxのネットワークURLを直接指定
                const emulator = new V86Starter({
                    wasm_path: "/v86.wasm",
                    memory_size: 64 * 1024 * 1024, // 軽量Linuxなので64MBで確実に駆動
                    arguments: [
                        "rw",
                        "root=/dev/ram0",
                        "init=/init",
                        "console=ttyS0"
                    ],
                    // copy.shの最新リポジトリから確実に取得できるパス
                    bzimage: { url: "https://copy.sh/v86/images/vmlinuz" }, 
                    initrd: { url: "https://copy.sh/v86/images/initrd.img" },
                    autostart: true
                });

                // 本物のCPUから送られてくる文字をそのまま画面に表示
                emulator.add_listener("serial0-output-char", function(char) {
                    terminal.innerHTML += char;
                    terminal.scrollTop = terminal.scrollHeight;
                });

                setTimeout(() => {
                    switchToGameCanvas();
                }, 4000);

            } catch (e) {
                terminal.innerHTML += "\n[VM HARDWARE ERROR] " + e.message + "\n";
            }
        }

        function switchToGameCanvas() {
            const canvas = document.getElementById('screen');
            const overlay = document.getElementById('touch-overlay');
            canvas.style.display = "block";
            overlay.style.display = "block";

            const gl = canvas.getContext('webgl2');
            if (!gl) return;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            gl.clearColor(0.7, 0.65, 0.3, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);
        }
    </script>
</body>
</html>
