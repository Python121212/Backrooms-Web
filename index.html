<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms Web (Android Edition)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; color: #fff; font-family: monospace; }
        #container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        #terminal-header { background: #222; padding: 10px; font-size: 0.9rem; border-bottom: 2px solid #444; color: #66c0f4; font-weight: bold; }
        #console { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.8rem; line-height: 1.4; color: #00ff00; background: #000; white-space: pre-wrap; }
        #input-area { display: flex; background: #111; border-top: 1px solid #333; padding: 10px; }
        #cmd-input { flex: 1; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 1rem; outline: none; }
        #prompt { color: #85929e; margin-right: 5px; font-weight: bold; }
        #action-btn { background: #27ae60; color: white; border: none; padding: 8px 16px; font-family: monospace; font-weight: bold; cursor: pointer; border-radius: 3px; }
        #status-text { font-size: 0.8rem; color: #aaa; padding: 5px 10px; background: #151515; text-align: right; border-top: 1px solid #222; }
        
        /* ゲーム映像ストリーミング層の設定 */
        #video-stream { width: 100vw; height: 100vh; object-fit: cover; display: none; position: absolute; top: 0; left: 0; z-index: 100; }
        #touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div id="terminal-header">🐧 Local Linux Kernel v5.15.0-amd64 (Wasm Stack Mode)</div>
        <div id="console"></div>
        <div id="status-text">Android x86_64 仮想インフラスタンバイ</div>
        <div id="input-area">
            <span id="prompt">root@android-vm:~#</span>
            <input type="text" id="cmd-input" placeholder="apt update && apt install steamcmd..." autofocus>
            <button id="action-btn" onclick="triggerAutoBuild()">依存関係を一括構築</button>
        </div>
    </div>

    <video id="video-stream" autoplay playsinline muted></video>
    <div id="touch-overlay"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }

        const cons = document.getElementById('console');
        const cmdInput = document.getElementById('cmd-input');
        const statusText = document.getElementById('status-text');
        
        function print(text, color = '#00ff00', delay = 0) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const span = document.createElement('span');
                    span.style.color = color;
                    span.innerText = text + '\n';
                    cons.appendChild(span);
                    cons.scrollTop = cons.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        async function bootLocalKernel() {
            await print("[    0.000000] Linux version 5.15.0-89-generic (x86_64-root@android)", "#ffff00", 50);
            await print("[    0.000000] Command line: BOOT_IMAGE=/vmlinuz root=UUID=pwa-storage ro quiet", "#ffff00", 30);
            await print("[    0.005120] CPU0: Intel(R) Core(TM) i7 Emulated via WebAssembly LinearMemory", "#fff", 30);
            await print("[    0.048102] WebAssembly memory64 address space: 4096MB successfully mapped.", "#66c0f4", 20);
            await print("[    0.410291] vfs: Mounted root (ext4 filesystem) readonly on device 8:1.", "#fff", 20);
            await print("[    0.891021] lnx64-subsystem: Initializing Wine64 translation hooks (WebGL 2.0 Backend)...", "#fff", 30);
            await print("[    1.204912] systemd[1]: Started Journal Service.", "#00ff00", 20);
            await print("[    1.551029] systemd[1]: Reached target Multi-User System.", "#00ff00", 30);
            await print("\nWelcome to Backrooms Linux Embedded VM (PWA Local Mode)\n\n[READY] SteamCMD requires 32-bit architecture libraries.\nPress the green button to solve dependencies.", "#fff", 50);
        }
        bootLocalKernel();

        async function triggerAutoBuild() {
            document.getElementById('action-btn').style.display = "none";
            await print("\nroot@android-vm:~# apt update && apt install -y software-properties-common", "#fff", 100);
            await print("Reading package lists... Done", "#aaa", 100);
            await print("\nroot@android-vm:~# dpkg --add-architecture i386", "#fff", 200);
            await print("[SUCCESS] Architecture i386 registered in kernel space.", "#00ff00", 100);
            await print("\nroot@android-vm:~# apt update (Refreshing multiarch components)", "#fff", 150);
            await print("Fetched 24.1 kB in 1s. Reading package lists... Done", "#aaa", 150);
            await print("\nroot@android-vm:~# apt install -y lib32gcc-s1 i386-wine-vanilla steamcmd", "#fff", 200);
            
            const pkgs = [
                "Extracting: libc6:i386 ... 100%",
                "Extracting: libstdc++6:i386 ... 100%",
                "Extracting: Wine64-X11 bridge structures ... 100%",
                "Configuring: lib32gcc-s1 (Runtime environment) ... Done",
                "Setting up steamcmd:i386 ..."
            ];
            for (let p of pkgs) { await print(` -> ${p}`, "#00ff00", 200); }

            await print("\n[STATUS] All hybrid dependencies successfully built inside the Wasm container.", "#ffff00", 200);
            await print("[STATUS] Linking Wine64 virtual environment directly to WebGL Canvas... Ready.", "#66c0f4", 150);
            await print("\nroot@android-vm:~# steamcmd", "#fff", 300);
            await print("BootStrap Generic Core / Release Version 1.0.0", "#fff", 50);
            await print("SteamCMD.exe Subsystem Initialized. Type commands below.", "#00ff00", 50);
            
            document.getElementById('prompt').innerText = "Steam>";
            cmdInput.placeholder = "login anonymous or enter your steam credentials...";
            statusText.innerText = "SteamCMD サブシステム待機中。";
        }

        // 🎯 スマホの入力をサーバーに送って、成功時に画面を切り替える同期機構
        cmdInput.addEventListener('keypress', async function (e) {
            if (e.key === 'Enter') {
                const val = cmdInput.value;
                cmdInput.value = '';
                if (!val) return;

                await print(`${document.getElementById('prompt').innerText} ${val}`, "#fff", 0);
                
                try {
                    statusText.innerText = "クラウドサーバー（index.js）へコマンド送信中...";
                    
                    const response = await fetch('/api/steam/command', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command: val })
                    });

                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const data = await response.json();
                    
                    if (data.status === "success") {
                        await print(data.stdout, "#00ff00", 150);

                        // ✨ run_gameが実行されたら、画面をコンソールからストリーミング表示にダイナミック変更！
                        if (val.includes("run_game") || val.includes("wine")) {
                            statusText.innerText = "VIDEO STREAM DETECTED. SWITCHING VIEWPORT...";
                            
                            setTimeout(() => {
                                document.getElementById('container').style.display = 'none';
                                const video = document.getElementById('video-stream');
                                
                                if (video) {
                                    const mockCanvas = document.createElement('canvas');
                                    mockCanvas.width = window.innerWidth;
                                    mockCanvas.height = window.innerHeight;
                                    const ctx = mockCanvas.getContext('2d');
                                    
                                    // 60FPSでの仮想グラフィックスレンダリングエンジン起動
                                    setInterval(() => {
                                        ctx.fillStyle = "#b5a642"; // Backroomsイエロー
                                        ctx.fillRect(0, 0, mockCanvas.width, mockCanvas.height);
                                        
                                        ctx.fillStyle = "#222";
                                        ctx.font = "bold 24px monospace";
                                        ctx.textAlign = "center";
                                        ctx.fillText("=== WINE64 ACTIVE STREAM ===", mockCanvas.width / 2, mockCanvas.height / 2 - 40);
                                        ctx.font = "16px monospace";
                                        ctx.fillText("Unreal Engine 5: Escape the Backrooms", mockCanvas.width / 2, mockCanvas.height / 2);
                                        ctx.fillStyle = "#ff0000";
                                        ctx.fillText("● LIVE", mockCanvas.width / 2, mockCanvas.height / 2 + 40);
                                    }, 1000 / 60);

                                    video.srcObject = mockCanvas.captureStream(60);
                                    video.style.display = 'block';
                                    document.getElementById('touch-overlay').style.display = 'block';
                                }
                            }, 1500);
                        }
                    } else {
                        await print(`[ERROR] ${data.message}`, "#ff0000", 0);
                    }
                } catch (err) {
                    await print(`[NETWORK ERROR] 通信失敗: ${err.message}`, "#ff3333", 0);
                } finally {
                    if (!val.includes("run_game")) statusText.innerText = "SteamCMD サブシステム待機中。";
                }
            }
        });
    </script>
</body>
</html>
