<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms Web (Android Edition)</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #screen { width: 100vw; height: 100vh; display: block; }
        #touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 1.2rem; z-index: 20; }
    </style>
</head>
<body>

    <div id="loading">Android 最適化環境 起動中...<br>OPFS 仮想Cドライブ接続中</div>
    <canvas id="screen"></canvas>
    <div id="touch-overlay"></div>

    <script>
        // 1. PWA Service Worker 登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').then(() => console.log('PWA Ready'));
        }

        // 2. OPFS（高速仮想ストレージ）の初期化
        async function initStorage() {
            const root = await navigator.storage.getDirectory();
            const driveC = await root.getDirectoryHandle('drive_c', { create: true });
            document.getElementById('loading').innerHTML = "SteamCMD 待機中...<br>Steamアカウントでログインしてください";
        }
        initStorage();

        // 3. WebTransportによる超軽量プロキシ通信の確立（例）
        // const transport = new WebTransport("https://<あなたのWorkersのURL>/rpc");

        // 4. タッチイベントのダイレクトキャッチ（仮想XInput構造体への書き込み準備）
        const overlay = document.getElementById('touch-overlay');
        overlay.addEventListener('touchstart', (e) => {
            // ここで座標を取得し、Wasm/Wineのメモリへ直接値をブチ込む（遅延を完全抹殺）
            const touch = e.touches[0];
            console.log("Touch X:", touch.clientX, "Y:", touch.clientY);
        }, { passive: true });
    </script>
</body>
</html>
