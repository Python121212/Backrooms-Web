<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms Web (Android Edition)</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #screen { width: 100vw; height: 100vh; display: none; }
        #touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 1.2rem; z-index: 20; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; width: 80%; }
        #login-btn, #play-btn { margin-top: 15px; padding: 12px 24px; background-color: #171a21; color: #fff; border: 1px solid #66c0f4; border-radius: 5px; font-size: 1.1rem; cursor: pointer; display: block; margin-left: auto; margin-right: auto; }
        #progress-bar { width: 100%; background-color: #2a475e; height: 10px; border-radius: 5px; margin-top: 15px; display: none; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background-color: #66c0f4; transition: width 0.3s ease; }
    </style>
</head>
<body>

    <div id="loading">
        <div id="status-text">Android 最適化環境 起動中...<br>OPFS 仮想Cドライブ接続中</div>
        <button id="login-btn" onclick="startSteamInstall()">Steamアカウントでログインしてインポート</button>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    
    <canvas id="screen"></canvas>
    <div id="touch-overlay"></div>

    <script>
        // 1. PWA Service Worker の登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').then(() => console.log('PWA Ready'));
        }

        // 2. 高速仮想ストレージ（OPFS）の初期化
        let storageRoot;
        async function initStorage() {
            try {
                storageRoot = await navigator.storage.getDirectory();
                await storageRoot.getDirectoryHandle('drive_c', { create: true });
                document.getElementById('status-text').innerHTML = "準備完了。ゲームデータをSteamからスマホへ自動インポートします。";
            } catch (e) {
                document.getElementById('status-text').innerHTML = "ストレージの初期化に失敗しました。";
            }
        }
        initStorage();

        // 3. SteamCMDのダウンロード & インポート処理
        async function startSteamInstall() {
            document.getElementById('login-btn').style.display = "none";
            const status = document.getElementById('status-text');
            const pBar = document.getElementById('progress-bar');
            const pFill = document.getElementById('progress-fill');

            status.innerHTML = "Wasm仮想環境の初期化中...<br>Pages Functions内蔵APIへ接続中...";
            pBar.style.display = "block";

            try {
                // 【変更点】Pages Functionsを利用し、同一ドメインの相対パスでリクエストを送る
                const workersUrl = "/steamcmd";
                
                status.innerHTML = "Steam公式サーバーと同期中...<br>SteamCMDバイナリを受信しています...";
                pFill.style.width = "30%";

                // 内蔵API経由でデータをフェッチ
                const response = await fetch(workersUrl);
                if (!response.ok) throw new Error("APIからのデータ取得に失敗しました。");
                
                pFill.style.width = "70%";
                status.innerHTML = "SteamCMDを解凍中...<br>仮想Cドライブ（OPFS）へ安全に書き込んでいます...";

                // スマホ内のOPFS（仮想Cドライブ）に保存
                const blob = await response.blob();
                const root = await navigator.storage.getDirectory();
                const driveC = await root.getDirectoryHandle('drive_c', { create: true });
                
                const fileHandle = await driveC.getFileHandle("steamcmd.tar.gz", { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(blob);
                await writable.close();

                pFill.style.width = "100%";
                status.innerHTML = "✨ SteamCMDの配置が完了しました！<br>Valve公式サーバーへのログインシーケンスへ移行可能です。";
                pBar.style.display = "none";
                
                // 次のWine実行フェーズ用の起動ボタンに変形
                const playBtn = document.createElement('button');
                playBtn.id = "play-btn";
                playBtn.style.backgroundColor = "#4caf50";
                playBtn.style.borderColor = "#81c784";
                playBtn.innerHTML = "🎮 Steamアカウント連携・起動";
                playBtn.onclick = () => bootGameEngine();
                document.getElementById('loading').appendChild(playBtn);

            } catch (err) {
                status.innerHTML = "Steam初期化中にエラーが発生しました。<br><small style='font-size:0.8rem;color:#ff4444;'>理由: " + err.message + "</small>";
            }
        }

        // 4. Wine & WebGLランタイム環境をブートしてメイン画面を立ち上げる処理
        function bootGameEngine() {
            document.getElementById('loading').style.display = "none";
            const canvas = document.getElementById('screen');
            const overlay = document.getElementById('touch-overlay');
            
            canvas.style.display = "block";
            overlay.style.display = "block";

            // WebGL 2.0 コンテキストの初期化
            const gl = canvas.getContext('webgl2');
            if (!gl) return alert("WebGL 2.0 非対応ブラウザです。");

            // 画面リサイズ処理
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // バックグラウンドをBackrooms特有の不気味な黄色でクリア
            gl.clearColor(0.7, 0.65, 0.3, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            console.log("WebGL 2.0 Render Loop Started.");
        }

        // 入力遅延をゼロにするタッチキャプチャ
        const overlay = document.getElementById('touch-overlay');
        overlay.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            console.log("Direct Input Capture -> X:", touch.clientX, "Y:", touch.clientY);
        }, { passive: true });
    </script>
</body>
</html>
